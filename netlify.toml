# Configuración de despliegue en Netlify.
# Al crear el sitio en Netlify, selecciona este repositorio; esta
# configuración le dice que la web vive en la carpeta web/.
[build]
  base = "web"
  command = "npm run build"
  publish = "dist"
# kikolareo.es redirige al dominio principal (SEO: una sola web canónica)
[[redirects]]
  from = "https://kikolareo.es/*"
  to = "https://kikolareo.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.kikolareo.es/*"
  to = "https://kikolareo.com/:splat"
  status = 301
  force = true
